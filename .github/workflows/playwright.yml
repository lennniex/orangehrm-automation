name: OrangeHRM Automation Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Permite ejecución manual

jobs:
  # ============================================================
  # JOB 1: Tests E2E con Playwright
  # ============================================================
  e2e-tests:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🎭 Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: 🧪 Ejecutar tests E2E
        run: npx playwright test tests/employee-flow.spec.ts --project=chromium
        continue-on-error: true  # Continuar aunque fallen (demo puede estar inestable)

      - name: 📊 Subir reporte E2E
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-e2e
          path: playwright-report/
          retention-days: 30

      - name: 📸 Subir screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 30

  # ============================================================
  # JOB 2: Tests de API con Playwright
  # ============================================================
  api-tests:
    name: 🔌 API Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm ci

      - name: 🎭 Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: 🔌 Ejecutar tests API
        run: npx playwright test tests/api/ --project=chromium
        continue-on-error: true

      - name: 📊 Subir reporte API
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-api
          path: playwright-report/
          retention-days: 30

      - name: 📁 Subir respuestas API
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-responses
          path: api-responses/
          retention-days: 30

  # ============================================================
  # JOB 3: Tests de Performance con K6
  # ============================================================
  performance-tests:
    name: ⚡ Performance Tests (K6)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📦 Instalar K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      - name: 📁 Crear directorio de reportes
        run: mkdir -p reports/performance

      - name: ⚡ Ejecutar test de carga (Login)
        run: k6 run tests/performance/login-load-test.js --out json=reports/performance/login-results.json
        continue-on-error: true

      - name: ⚡ Ejecutar test de estrés (Empleados)
        run: k6 run tests/performance/employee-stress-test.js --out json=reports/performance/stress-results.json
        continue-on-error: true

      - name: 📊 Subir reportes Performance
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-reports
          path: reports/performance/
          retention-days: 30

  # ============================================================
  # JOB 4: Generar reporte consolidado
  # ============================================================
  generate-summary:
    name: 📋 Generar Resumen
    runs-on: ubuntu-latest
    needs: [e2e-tests, api-tests, performance-tests]
    if: always()
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 📊 Crear resumen
        run: |
          echo "# 📊 Resumen de Ejecución - OrangeHRM Automation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🎭 Tests E2E" >> $GITHUB_STEP_SUMMARY
          echo "- **Estado:** ${{ needs.e2e-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🔌 Tests API" >> $GITHUB_STEP_SUMMARY
          echo "- **Estado:** ${{ needs.api-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ⚡ Tests Performance" >> $GITHUB_STEP_SUMMARY
          echo "- **Estado:** ${{ needs.performance-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 📁 Artefactos" >> $GITHUB_STEP_SUMMARY
          echo "- playwright-report-e2e" >> $GITHUB_STEP_SUMMARY
          echo "- playwright-report-api" >> $GITHUB_STEP_SUMMARY
          echo "- api-responses" >> $GITHUB_STEP_SUMMARY
          echo "- performance-reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "*Generado por: Lenninlex - QA Automation Engineer*" >> $GITHUB_STEP_SUMMARY
          echo "*Reto AGILE TESTER - Banco Davivienda*" >> $GITHUB_STEP_SUMMARY
